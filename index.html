<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lexique — carnet de vocabulaire bilingue</title>
<style>
  :root{
    --green:#1E5C46; --green-dark:#14402F; --paper:#F6F4EE; --card:#FFFFFF;
    --ink:#22251F; --ink-soft:#6B6E63; --gold:#C9A227; --gold-soft:#F3E8C9;
    --line:#E2DFD5; --red:#A4442E;
    --serif:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif;
    --sans:-apple-system,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans)}
  .wrap{max-width:640px;margin:0 auto}
  header{background:var(--green);color:var(--paper);padding:20px 16px 16px}
  header h1{font-family:var(--serif);font-size:30px;margin:0;font-weight:700}
  header p{margin:2px 0 0;font-size:13px;opacity:.85}
  .stats{display:flex;gap:20px;margin-top:14px}
  .stat b{font-family:var(--serif);font-size:22px;font-weight:700;color:var(--gold);display:block}
  .stat span{font-size:11px;opacity:.8}
  nav{background:var(--green-dark);position:sticky;top:0;z-index:10}
  nav .wrap{display:flex}
  nav button{flex:1;padding:12px 0;background:none;border:none;border-bottom:3px solid transparent;
    color:rgba(246,244,238,.75);font-size:14px;font-weight:600;cursor:pointer}
  nav button.active{color:var(--gold);border-bottom-color:var(--gold)}
  main{padding:20px 16px 60px}
  .dir{display:flex;gap:8px;margin-bottom:12px}
  .dir button{padding:6px 14px;border-radius:999px;border:1.5px solid var(--line);
    background:var(--card);color:var(--ink-soft);font-size:13px;font-weight:600;cursor:pointer}
  .dir button.active{background:var(--green);border-color:var(--green);color:var(--paper)}
  .search{display:flex;gap:8px}
  .search input{flex:1;padding:12px 14px;font-size:17px;font-family:var(--serif);
    border:1.5px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);outline:none}
  .search button{padding:0 20px;border-radius:8px;border:none;background:var(--gold);
    color:var(--ink);font-weight:700;font-size:14px;cursor:pointer}
  .search button:disabled{background:var(--line);cursor:default}
  .err{color:var(--red);font-size:14px;margin-top:10px}
  article{margin-top:20px;background:var(--card);border:1px solid var(--line);
    border-left:4px solid var(--green);border-radius:8px;padding:18px 20px}
  .head{display:flex;justify-content:space-between;align-items:baseline}
  .head .hw{font-family:var(--serif);font-size:24px;font-weight:700}
  .flag{font-size:11px;letter-spacing:.08em;color:var(--ink-soft)}
  .trans{font-family:var(--serif);font-size:20px;color:var(--green);margin-top:6px;font-weight:600}
  .saved{margin:12px 0 0;font-size:12px;color:var(--green);font-weight:600}
  .empty{color:var(--ink-soft);font-size:14px;line-height:1.6;margin-top:24px}
  .row{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--green);
    border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px}
  .row.ok{border-left-color:var(--gold)}
  .row .src{font-family:var(--serif);font-weight:700;font-size:16px}
  .row .tr{font-family:var(--serif);color:var(--green)}
  .row .meta{font-size:11px;color:var(--ink-soft);margin-top:2px}
  .row .del{border:none;background:none;color:var(--ink-soft);font-size:16px;cursor:pointer;padding:6px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:40px 20px;margin:14px 0;min-height:150px;text-align:center;cursor:pointer}
  .card .word{font-family:var(--serif);font-size:28px;font-weight:700;margin-top:8px}
  .card .rev{font-family:var(--serif);font-size:22px;color:var(--green);font-weight:600;margin-top:14px}
  .center{text-align:center}
  .rate{display:flex;gap:10px;justify-content:center}
  .rate .no{padding:12px 22px;border-radius:8px;border:1.5px solid var(--red);background:var(--card);color:var(--red);font-weight:700;cursor:pointer}
  .rate .yes{padding:12px 22px;border-radius:8px;border:none;background:var(--green);color:var(--paper);font-weight:700;cursor:pointer}
  .hint{color:var(--ink-soft);font-size:13px;margin-top:16px}
  .hidden{display:none}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>Lexique</h1>
    <p>Dictionnaire bilingue à mémoire — chaque recherche enrichit ton carnet.</p>
    <div class="stats">
      <div class="stat"><b id="s-total">0</b><span>mots au carnet</span></div>
      <div class="stat"><b id="s-ok">0</b><span>acquis</span></div>
      <div class="stat"><b id="s-todo">0</b><span>à travailler</span></div>
    </div>
  </div>
</header>

<nav><div class="wrap">
  <button data-tab="recherche" class="active">Recherche</button>
  <button data-tab="tableau">Carnet</button>
  <button data-tab="revision">Révision</button>
</div></nav>

<main class="wrap">
  <!-- RECHERCHE -->
  <section id="recherche">
    <div class="dir">
      <button data-dir="en-fr" class="active">Anglais → Français</button>
      <button data-dir="fr-en">Français → Anglais</button>
    </div>
    <div class="search">
      <input id="q" placeholder="Un mot anglais…" autocomplete="off" />
      <button id="go">Traduire</button>
    </div>
    <div id="err" class="err hidden"></div>
    <div id="result"></div>
    <p id="hint-empty" class="empty">Cherche ton premier mot : il sera traduit puis rangé
      automatiquement dans ton carnet pour la révision.</p>
  </section>

  <!-- CARNET -->

  <section id="tableau" class="hidden">
    <div id="list"></div>
  </section>

  <!-- RÉVISION -->

  <section id="revision" class="hidden center">
    <div id="rev-area"></div>
  </section>
</main>

<script>
const KEY = "lexique-data-v1";
let words = [];
let direction = "en-fr";
let revCard = null, revealed = false, revDone = 0;

// ── Mémoire (localStorage) ──────────────────────────────
function load(){
  try{ words = JSON.parse(localStorage.getItem(KEY)) || []; }
  catch(e){ words = []; }
}
function save(){ localStorage.setItem(KEY, JSON.stringify(words)); }

// ── Stats ───────────────────────────────────────────────
function isAcquired(w){ return w.correct >= 3 && w.correct > w.wrong; }
function refreshStats(){
  const ok = words.filter(isAcquired).length;
  document.getElementById("s-total").textContent = words.length;
  document.getElementById("s-ok").textContent = ok;
  document.getElementById("s-todo").textContent = words.length - ok;
}

// ── Traduction via MyMemory (gratuit, sans clé) ─────────
async function translate(){
  const input = document.getElementById("q");
  const q = input.value.trim();
  const errBox = document.getElementById("err");
  const btn = document.getElementById("go");
  if(!q) return;
  errBox.classList.add("hidden");
  btn.disabled = true; btn.textContent = "…";
  const pair = direction === "en-fr" ? "en|fr" : "fr|en";
  try{
    const url = "https://api.mymemory.translated.net/get?q=" +
      encodeURIComponent(q) + "&langpair=" + pair;
    const res = await fetch(url);
    const data = await res.json();
    const translation = (data.responseData && data.responseData.translatedText) || "";
    if(!translation) throw new Error("vide");

    // alternatives éventuelles fournies par l'API
    const alts = (data.matches || [])
      .map(m => m.translation)
      .filter(t => t && t.toLowerCase() !== translation.toLowerCase())
      .slice(0, 2);

    const entry = {
      id: Date.now(),
      source: q,
      translation,
      alternatives: [...new Set(alts)],
      direction,
      date: new Date().toISOString(),
      correct: 0, wrong: 0
    };

    // remplace si le mot existe déjà dans le même sens
    words = words.filter(w =>
      !(w.source.toLowerCase() === entry.source.toLowerCase() && w.direction === direction));
    words.unshift(entry);
    save();
    renderResult(entry);
    refreshStats();
    input.value = "";
    document.getElementById("hint-empty").classList.add("hidden");
  }catch(e){
    errBox.textContent = "Traduction impossible. Vérifie ta connexion et réessaie.";
    errBox.classList.remove("hidden");
  }
  btn.disabled = false; btn.textContent = "Traduire";
}

function flag(d){ return d === "en-fr" ? "EN → FR" : "FR → EN"; }

function renderResult(w){
  const alts = w.alternatives.length
    ? `<span style="font-size:15px;color:var(--ink-soft);font-weight:400"> · ${w.alternatives.join(" · ")}</span>`
    : "";
  document.getElementById("result").innerHTML = `
    <article>
      <div class="head">
        <span class="hw">${escapeHtml(w.source)}</span>
        <span class="flag">${flag(w.direction)}</span>
      </div>
      <div class="trans">${escapeHtml(w.translation)}${alts}</div>
      <p class="saved">✓ Enregistré dans le carnet</p>
    </article>`;
}

// ── Carnet ──────────────────────────────────────────────
function renderList(){
  const el = document.getElementById("list");
  if(!words.length){
    el.innerHTML = `<p class="empty">Le carnet est vide. Chaque traduction faite dans l'onglet Recherche s'ajoutera ici.</p>`;
    return;
  }
  el.innerHTML = words.map(w => {
    const ok = isAcquired(w);
    const score = ok ? "acquis" : `${w.correct}✓ ${w.wrong}✗`;
    return `<div class="row ${ok ? "ok" : ""}">
      <div style="min-width:0">
        <div><span class="src">${escapeHtml(w.source)}</span>
          <span style="color:var(--ink-soft)"> — </span>
          <span class="tr">${escapeHtml(w.translation)}</span></div>
        <div class="meta">${flag(w.direction)} · ${new Date(w.date).toLocaleDateString("fr-FR")} · ${score}</div>
      </div>
      <button class="del" data-id="${w.id}" aria-label="Supprimer">✕</button>
    </div>`;
  }).join("");
  el.querySelectorAll(".del").forEach(b =>
    b.onclick = () => { words = words.filter(w => w.id != b.dataset.id); save(); renderList(); refreshStats(); });
}

// ── Révision (répétition espacée simple) ────────────────
function pickCard(list){
  if(!list.length) return null;
  const weights = list.map(w => 1 + Math.max(0, 2*w.wrong - w.correct));
  const total = weights.reduce((a,b)=>a+b,0);
  let r = Math.random()*total;
  for(let i=0;i<list.length;i++){ r -= weights[i]; if(r<=0) return list[i]; }
  return list[list.length-1];
}
function startRevision(){
  revDone = 0; revealed = false;
  revCard = pickCard(words);
  renderRevision();
}
function renderRevision(){
  const el = document.getElementById("rev-area");
  if(!words.length){
    el.innerHTML = `<p class="empty">Ajoute d'abord des mots via la recherche pour lancer une révision.</p>`;
    return;
  }
  const back = revealed
    ? `<div class="rev">${escapeHtml(revCard.translation)}</div>`
    : `<p class="hint">Touche la carte pour révéler la traduction</p>`;
  const rate = revealed
    ? `<div class="rate">
         <button class="no" data-ok="0">À revoir</button>
         <button class="yes" data-ok="1">Je savais</button>
       </div>` : "";
  el.innerHTML = `
    <p style="font-size:12px;color:var(--ink-soft);letter-spacing:.06em">
      CARTE ${revDone+1} · les mots ratés reviennent plus souvent</p>
    <div class="card" id="flip">
      <span class="flag">${flag(revCard.direction)}</span>
      <div class="word">${escapeHtml(revCard.source)}</div>
      ${back}
    </div>
    ${rate}`;
  document.getElementById("flip").onclick = () => { if(!revealed){ revealed = true; renderRevision(); } };
  el.querySelectorAll("[data-ok]").forEach(b =>
    b.onclick = () => answer(b.dataset.ok === "1"));
}
function answer(ok){
  const w = words.find(x => x.id === revCard.id);
  if(w){ ok ? w.correct++ : w.wrong++; save(); refreshStats(); }
  revDone++; revealed = false;
  revCard = pickCard(words);
  renderRevision();
}

// ── Navigation ──────────────────────────────────────────
function showTab(tab){
  ["recherche","tableau","revision"].forEach(t =>
    document.getElementById(t).classList.toggle("hidden", t !== tab));
  document.querySelectorAll("nav button").forEach(b =>
    b.classList.toggle("active", b.dataset.tab === tab));
  if(tab === "tableau") renderList();
  if(tab === "revision") startRevision();
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c =>
    ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

// ── Câblage ─────────────────────────────────────────────
document.querySelectorAll("nav button").forEach(b => b.onclick = () => showTab(b.dataset.tab));
document.querySelectorAll(".dir button").forEach(b => b.onclick = () => {
  direction = b.dataset.dir;
  document.querySelectorAll(".dir button").forEach(x => x.classList.remove("active"));
  b.classList.add("active");
  document.getElementById("q").placeholder = direction === "en-fr" ? "Un mot anglais…" : "Un mot français…";
});
document.getElementById("go").onclick = translate;
document.getElementById("q").addEventListener("keydown", e => { if(e.key === "Enter") translate(); });

load();
refreshStats();
if(words.length) document.getElementById("hint-empty").classList.add("hidden");
</script>

</body>
</html>
